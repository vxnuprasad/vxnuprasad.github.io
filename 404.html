<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:600px;
    padding:20px;
}

h1{
    font-size:6rem;
    color:#5b82ff;
    margin:0;
}

p{
    color:#aaa;
    margin:15px 0;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:12px 24px;
    background:#5b82ff;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">Return Home</a>
</div>

</body>
</html>
